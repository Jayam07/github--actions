name: deploy flask app

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with docker compose
        run: docker compose down && docker compose up -d --force-recreate --pull always