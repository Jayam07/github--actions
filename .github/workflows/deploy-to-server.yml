name: Deploy To Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to Prod server and prepare machine
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Installing Docker from official Docker repository"

            sudo apt-get update
            sudo apt-get install -y ca-certificates curl gnupg

            sudo install -m 0755 -d /etc/apt/keyrings

            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
              sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg

            sudo chmod a+r /etc/apt/keyrings/docker.gpg

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

            sudo apt-get update

            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            mkdir -p ~/devops

            sudo docker --version
            sudo docker compose version

      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: SSH to Prod server and run app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Running App"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              sudo docker login --username "${{ vars.DOCKERHUB_USER }}" --password-stdin

            cd ~/devops

            sudo DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }} DOCKER_TAG=latest docker compose down || true
            sudo DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }} DOCKER_TAG=latest docker compose up -d --force-recreate --pull always